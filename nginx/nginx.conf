upstream auth_upstream {
    server auth:8000;
}

upstream pipeline_upstream {
    server pipeline:8002;
}

upstream jobs_upstream {
    server jobs:8003;
}

upstream gmail_upstream {
    server gmail:8004;
}

server {
    listen 80;
    client_max_body_size 50M;

    # ── Common proxy headers ───────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie            $http_cookie;
    proxy_set_header Origin            $http_origin;

    # ── SSE — disable buffering globally ──────────────────────
    proxy_buffering         off;
    proxy_cache             off;
    proxy_http_version      1.1;
    proxy_set_header        Connection '';
    proxy_read_timeout      300s;
    proxy_connect_timeout   10s;

    # ── auth-service ──────────────────────────────────────────
    location /auth {
        proxy_pass http://auth_upstream;
    }

    location /profile {
        proxy_pass http://auth_upstream;
    }

    # ── pipeline-service ──────────────────────────────────────
    location /scraping {
        proxy_pass http://pipeline_upstream;
    }

    location /filter {
        proxy_pass http://pipeline_upstream;
    }

    location /enrich {
        proxy_pass http://pipeline_upstream;
    }

    location /pipeline {
        proxy_pass http://pipeline_upstream;
    }

    location /letter {
        proxy_pass http://pipeline_upstream;
    }

    # ── jobs-service ──────────────────────────────────────────
    location /jobs {
        proxy_pass http://jobs_upstream;
    }

    # ── gmail-service ─────────────────────────────────────────
    location /gmail {
        proxy_pass http://gmail_upstream;
    }

    location /candidatures {
        proxy_pass http://gmail_upstream;
    }
}
