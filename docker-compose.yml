  #   environment:
  #     RAG_URL: http://rag:8001
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M

  # ── Frontend (docker optionnel — utilise ng serve en dev) ──
  # frontend:
  #   build: ./src/SmartApplyFront
  #   container_name: smartapply-ui
  #   ports:
  #     - "4200:4200"
  #   depends_on:
  #     - gateway
  #   volumes:
  #     - ./src/SmartApplyFront:/app
  #     - /app/node_modules
  #   deploy:
  #     resources:
