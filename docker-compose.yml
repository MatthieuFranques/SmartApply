services:

  # ── Infrastructure ─────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: smartapply-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB}
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping')\" --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  gateway:
    image: nginx:1.27-alpine
    container_name: smartapply-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - rag
    restart: unless-stopped

  # ── Services ───────────────────────────────────────────────
  # Current state : monolith (backend handles auth + pipeline + jobs + gmail).
  # Migration path: extract each domain into its own service and update
  # the matching upstream block in nginx/nginx.conf.

  backend:
    build: ./src/SmartApplyBack
    container_name: smartapply-api
    # Port exposed for direct dev access — remove once fully split behind gateway.
    ports:
      - "8000:8000"
    env_file: ./src/SmartApplyBack/.env
    environment:
      RAG_URL: http://rag:8001
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  rag:
    build: ./src/SmartApplyRag
    container_name: smartapply-rag
    # Port exposed for direct dev access — internal traffic via backend only.
    ports:
      - "8001:8001"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      CHROMA_PATH: /app/data/chroma
      INBOX_PATH: /app/data/inbox
    volumes:
      - rag_data:/app/data/chroma
      - rag_inbox:/app/data/inbox
    deploy:
      resources:
        limits:
          memory: 512M

