<div class="filter-bar" *ngIf="cities.length > 1">
  <button type="button"
          class="filter-btn"
          [class.active]="selected === 'all'"
          (click)="citySelected.emit('all')">TOUTES ({{ total }})</button>

  <button type="button"
          *ngFor="let c of cities"
          class="filter-btn"
          [class.active]="selected === c.name"
          (click)="citySelected.emit(c.name)">{{ c.name }} ({{ c.count }})</button>
</div>
