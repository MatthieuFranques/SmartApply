<div class="city-filters" *ngIf="cities.length > 1">
  <span class="filter-label">Ville</span>
  <button class="city-chip all"
          [class.active]="selected === 'all'"
          (click)="select.emit('all')">
    Toutes ({{ total }})
  </button>
  <button *ngFor="let c of cities"
          class="city-chip"
          [class.active]="selected === c.name"
          (click)="select.emit(c.name)">
    {{ c.name }} ({{ c.count }})
  </button>
</div>
