<div class="dashboard">

  <!-- Auth checking -->
  <div class="auth-checking" *ngIf="authChecking">
    <div class="spinner"></div>
    <span>Vérification de la session...</span>
  </div>

  <!-- Écran connexion -->
  <app-auth-screen
    *ngIf="!authChecking && !authenticated"
    [errorMessage]="statusMessage"
    (connect)="connectGmail()">
  </app-auth-screen>

  <!-- App principale -->
  <ng-container *ngIf="!authChecking && authenticated">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <a class="logo" routerLink="/" title="Retour à l'accueil">Smart<span>Apply</span></a>
        <div class="subtitle">job search pipeline</div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn" [class.active]="activeTab === 'companies'"
                (click)="activeTab = 'companies'">ENTREPRISES</button>
        <button class="nav-btn" [class.active]="activeTab === 'applications'"
                (click)="activeTab = 'applications'">CANDIDATURES</button>
        <button class="nav-btn" [class.active]="activeTab === 'offers'"
                (click)="activeTab = 'offers'">OFFRES</button>
        <button class="nav-btn nav-pipeline" (click)="showPipeline = true">▶ PIPELINE</button>
        <button class="helper-btn" title="Besoin d'aide ?"><span class="icon">?</span></button>
        <span class="user-email">{{ currentUser?.email }}</span>
        <button class="btn-logout" (click)="logout()">DÉCO</button>
      </nav>
    </div>

    <!-- Onglet Entreprises -->
    <ng-container *ngIf="activeTab === 'companies'">

      <div class="status-bar" *ngIf="loading || statusMessage">
        <div class="dot" *ngIf="loading"></div>
        {{ statusMessage }}
      </div>

      <app-stats-bar *ngIf="companies.length" [stats]="statItems"></app-stats-bar>

     <app-city-filters
  [cities]="cityItems"
  [selected]="selectedCity"
  [total]="companies.length"
  (citySelected)="filterByCity($event)"> </app-city-filters>

      <app-company-table
        [companies]="filteredCompanies"
        (rowClick)="openDetail($event)">
      </app-company-table>
    </ng-container>

    <!-- Onglet Candidatures -->
    <ng-container *ngIf="activeTab === 'applications'">
      <app-applications></app-applications>
    </ng-container>

    <!-- Onglet Offres -->
    <ng-container *ngIf="activeTab === 'offers'">
      <app-offers></app-offers>
    </ng-container>

  </ng-container>

</div>

<!-- Panel slide -->
<app-company-detail
  [company]="selectedCompany"
  (closed)="closeDetail()"
  (deleted)="onDeleted($event)">
</app-company-detail>

<!-- Pipeline modal -->
<app-pipeline
  [visible]="showPipeline"
  (closed)="showPipeline = false"
  (pipelineDone)="onPipelineDone()">
</app-pipeline>
