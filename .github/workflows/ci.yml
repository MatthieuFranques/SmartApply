name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Run FastAPI tests with coverage
  # ─────────────────────────────────────────
  test:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./src/SmartApplyBack 
        run: |
          pip install -r requirements.txt
          # On ajoute les dépendances de test ici pour être sûr
          pip install pytest pytest-cov pytest-asyncio httpx python-jose[cryptography]

      - name: Run tests with coverage
        working-directory: ./src/SmartApplyBack
        env:
          PYTHONPATH: .
          ENV: development
          SECRET_KEY: "test_secret_key_github_actions"
          ALGORITHM: "HS256"
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./src/SmartApplyBack/coverage.xml
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2 — SonarCloud static analysis
  # Runs only after tests pass
  # ─────────────────────────────────────────
  sonarcloud:
      name: SonarCloud Analysis
      runs-on: ubuntu-latest
      needs: test

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Download coverage report
          uses: actions/download-artifact@v4
          with:
            name: coverage-report
            path: ./src/SmartApplyBack

        - name: Run SonarCloud scan
          # Utilisation du SHA fixe pour la sécurité (correspond à v3.1.0)
          uses: SonarSource/sonarcloud-github-action@02efed30739fb57e3610b85d0d6d37389a8137e3
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          with:
            projectBaseDir: ./src/SmartApplyBack
            args: >
              -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
              -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}