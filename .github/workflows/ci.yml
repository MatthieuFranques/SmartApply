name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Backend tests (all services) + single Sonar scan
  # ─────────────────────────────────────────
  test-backend:
    name: Backend Tests + Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for Sonar blame/PR decoration

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Pipeline tests with coverage
        working-directory: ./src/SmartApplyPipeline
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: "ci_test_secret_key_minimum_32_chars"
          MONGODB_URI: "mongodb://localhost:27017"
          MONGODB_DB: "test_db"
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "mistral"
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -v

      - name: Run Gmail tests with coverage
        working-directory: ./src/SmartApplyGmail
        env:
          PYTHONPATH: .
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -v

      - name: Run RAG tests with coverage
        working-directory: ./src/SmartApplyRag
        env:
          PYTHONPATH: .
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "mistral"
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -v

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ─────────────────────────────────────────
  # Job 2 — Angular build check
  # ─────────────────────────────────────────
  build-frontend:
    name: Angular Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/SmartApplyFront/package-lock.json

      - name: Install dependencies
        working-directory: ./src/SmartApplyFront
        run: npm ci

      - name: Build Angular app
        working-directory: ./src/SmartApplyFront
        run: npx ng build --configuration=production
