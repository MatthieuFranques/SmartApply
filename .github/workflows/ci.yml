name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Run FastAPI tests with coverage
  # ─────────────────────────────────────────
  test:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./src/SmartApplyBack 
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: ./src/SmartApplyBack
        env:
          PYTHONPATH: .
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./src/SmartApplyBack/coverage.xml
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2 — SonarCloud static analysis
  # Runs only after tests pass
  # ─────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full git history required by SonarCloud
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./src/SmartApplyBack

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@49e6cd3b187936a73b8280d59ffd9da69df63ec9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./src/SmartApplyBack