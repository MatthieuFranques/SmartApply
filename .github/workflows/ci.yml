name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # Job 1 — SmartApplyPipeline tests
  # ─────────────────────────────────────────
  test-pipeline:
    name: Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/SmartApplyPipeline/requirements.txt

      - name: Install dependencies
        working-directory: ./src/SmartApplyPipeline
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        working-directory: ./src/SmartApplyPipeline
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: "ci_test_secret_key_minimum_32_chars"
          MONGODB_URI: "mongodb://localhost:27017"
          MONGODB_DB: "test_db"
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "mistral"
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-coverage
          path: ./src/SmartApplyPipeline/coverage.xml
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2 — Angular build check
  # ─────────────────────────────────────────
  build-frontend:
    name: Angular Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/SmartApplyFront/package-lock.json

      - name: Install dependencies
        working-directory: ./src/SmartApplyFront
        run: npm ci

      - name: Build Angular app
        working-directory: ./src/SmartApplyFront
        run: npx ng build --configuration=production
